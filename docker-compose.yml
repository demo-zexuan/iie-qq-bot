services:
  napcat:
    extra_hosts:
      # 将 host.docker.internal 解析到宿主机，使容器内可以访问宿主机服务
      - "host.docker.internal:host-gateway"
    environment:
      - HTTPS_PROXY=http://172.17.0.1:7890
      - HTTP_PROXY=http://172.17.0.1:7890
      - https_proxy=http://172.17.0.1:7890
      - http_proxy=http://172.17.0.1:7890
      - NO_PROXY=localhost,127.0.0.1,.local
      - no_proxy=localhost,127.0.0.1,.local
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - MODE=astrbot
    ports:
      - 3000:3000
      - 3001:3001
      - 6099:6099
    container_name: napcat
    restart: always
    image: mlikiowa/napcat-docker:latest
    volumes:
      - ./data:/AstrBot/data
      - ./napcat/config:/app/napcat/config
      - ./ntqq:/app/.config/QQ
    networks:
      - astrbot_network

  astrbot:
    image: soulter/astrbot:latest
    container_name: astrbot
    restart: always
    ports:
      - "6185:6185"
      - "6199:6199"
    environment:
      - HTTPS_PROXY=http://172.17.0.1:7890
      - HTTP_PROXY=http://172.17.0.1:7890
      - https_proxy=http://172.17.0.1:7890
      - http_proxy=http://172.17.0.1:7890
      - NO_PROXY=localhost,127.0.0.1,.local
      - no_proxy=localhost,127.0.0.1,.local
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/AstrBot/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - astrbot_network

  shipyard:
    image: soulter/shipyard-bay:latest
    container_name: astrbot_shipyard
    environment:
      - HTTPS_PROXY=http://172.17.0.1:7890
      - HTTP_PROXY=http://172.17.0.1:7890
      - https_proxy=http://172.17.0.1:7890
      - http_proxy=http://172.17.0.1:7890
      - NO_PROXY=localhost,127.0.0.1,.local
      - no_proxy=localhost,127.0.0.1,.local
      - PORT=8156
      - DATABASE_URL=sqlite+aiosqlite:///./data/bay.db
      - ACCESS_TOKEN=secret-token
      - MAX_SHIP_NUM=10
      - BEHAVIOR_AFTER_MAX_SHIP=reject
      - DOCKER_IMAGE=soulter/shipyard-ship:latest
      - DOCKER_NETWORK=astrbot_network
      - SHIP_DATA_DIR=${PWD}/data/shipyard/ship_mnt_data
      - DEFAULT_SHIP_CPUS=1.0
      - DEFAULT_SHIP_MEMORY=512m
    volumes:
      - ${PWD}/data/shipyard/bay_data:/app/data
      - ${PWD}/data/temp:/AstrBot/data/temp
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - astrbot_network

  postgres:
    image: postgres:16-alpine
    container_name: iie-qq-bot-postgres
    restart: always
    environment:
      - HTTPS_PROXY=http://172.17.0.1:7890
      - HTTP_PROXY=http://172.17.0.1:7890
      - https_proxy=http://172.17.0.1:7890
      - http_proxy=http://172.17.0.1:7890
      - NO_PROXY=localhost,127.0.0.1,.local
      - no_proxy=localhost,127.0.0.1,.local
      - POSTGRES_DB=${PG_DATABASE:-iie_qq_bot}
      - POSTGRES_USER=${PG_USER:-postgres}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-postgres}
      - TZ=${GROUP_STATS_TIMEZONE:-Asia/Shanghai}
    ports:
      - 5432:5432
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-iie_qq_bot}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - astrbot_network

networks:
  astrbot_network:
    name: astrbot_network
    driver: bridge

volumes:
  pg-data:
